<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPE Detection - Detection Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🦺 PPE Detection System</h1>
            <p class="subtitle">Real-time Personal Protective Equipment Detection</p>
        </header>

        <div class="content">
            <div class="left-panel">
                <div class="settings-panel">
                    <h3>Settings</h3>
                    <div class="setting-group">
                        <label for="confidence">Confidence Threshold</label>
                        <input type="range" id="confidence" min="0" max="1" step="0.05" value="0.5">
                        <span id="confValue">0.50</span>
                    </div>
                </div>

                <div class="upload-panel">
                    <h3>Upload</h3>
                    <div class="upload-area" id="uploadArea">
                        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <h4>Drop files here</h4>
                        <p>or click to browse</p>
                        <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;">
                    </div>
                </div>

                <div class="info-panel">
                    <h3>Model Info</h3>
                    <div id="modelInfo" class="model-info-content">
                        <p>Loading...</p>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="preview-section">
                    <h3>Preview</h3>
                    <div class="preview-container">
                        <img id="preview" class="preview-image" style="display: none;">
                        <video id="videoPreview" class="preview-video" style="display: none;" controls></video>
                        <div class="empty-state" id="emptyState">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <p>Upload an image or video to see preview</p>
                        </div>
                    </div>
                </div>

                <div class="results-section">
                    <h3>Detection Results</h3>
                    <button id="predictBtn" class="predict-button" disabled>🚀 Detect PPE</button>
                    <div id="resultsList" class="results-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
